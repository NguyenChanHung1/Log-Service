name: log-service

services:
  kafka:
    image: apache/kafka:3.7.1
    container_name: log-service-kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NUM_PARTITIONS: "6"
      KAFKA_LOG_RETENTION_HOURS: "72"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka-init:
    image: apache/kafka:3.7.1
    container_name: log-service-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/create-topics.sh:/scripts/create-topics.sh:ro
    command: ["/bin/bash", "/scripts/create-topics.sh"]
    restart: "no"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: log-service-elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: "single-node"
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      - ./elasticsearch/index-template.json:/usr/share/elasticsearch/config/logs-index-template.json:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 18

  elasticsearch-init:
    image: curlimages/curl:8.8.0
    container_name: log-service-elasticsearch-init
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./elasticsearch/index-template.json:/templates/index-template.json:ro
      - ./elasticsearch/install-index-template.sh:/scripts/install-index-template.sh:ro
    command: ["/bin/sh", "/scripts/install-index-template.sh"]
    restart: "no"

  log-api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: log-api
    container_name: log-service-api
    ports:
      - "8080:8080"
    environment:
      APP_PORT: "8080"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_LOG_TOPIC: "logs.raw"
      MAX_BATCH_SIZE: "1000"
      MAX_BODY_BYTES: "1048576"
      REQUEST_TIMEOUT: "5s"
      MAX_IN_FLIGHT_REQUESTS: "256"
      SPOOL_DIR: "/tmp/log-service-spool"
      SPOOL_MAX_BYTES: "1073741824"
    volumes:
      - log-api-spool:/tmp/log-service-spool
    depends_on:
      kafka:
        condition: service_healthy
    profiles:
      - app

  log-worker:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: log-worker
    container_name: log-service-worker
    ports:
      - "8081:8081"
    environment:
      WORKER_PORT: "8081"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_LOG_TOPIC: "logs.raw"
      KAFKA_RETRY_TOPIC: "logs.retry"
      KAFKA_DLQ_TOPIC: "logs.dlq"
      KAFKA_CONSUMER_GROUP: "log-workers"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      SPOOL_DIR: "/tmp/log-service-worker-spool"
    volumes:
      - log-worker-spool:/tmp/log-service-worker-spool
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    profiles:
      - app

  dashboard-api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: dashboard-api
    container_name: log-service-dashboard-api
    ports:
      - "8082:8082"
    environment:
      DASHBOARD_API_PORT: "8082"
      LOG_API_URL: "http://log-api:8080"
      WORKER_API_URL: "http://log-worker:8081"
      KAFKA_BROKERS: "kafka:9092"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
    depends_on:
      log-api:
        condition: service_started
      log-worker:
        condition: service_started
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    profiles:
      - app

  dashboard-ui:
    image: nginx:1.27-alpine
    container_name: log-service-dashboard-ui
    ports:
      - "3000:80"
    volumes:
      - ../web/dashboard:/usr/share/nginx/html:ro
    depends_on:
      - dashboard-api
    profiles:
      - app

volumes:
  kafka-data:
  elasticsearch-data:
  log-api-spool:
  log-worker-spool:
